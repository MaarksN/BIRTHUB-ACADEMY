name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://inside:inside@localhost:5432/inside_sales?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inside_sales
          POSTGRES_USER: inside
          POSTGRES_PASSWORD: inside
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm validate
      - run: pnpm prisma:validate
      - run: pnpm test
      - run: pnpm build
